<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'사량'인터뷰-서연</title>

    <!-- Pretendard 폰트 추가 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/OKGUNG.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>


    <style>
        /* 기본 환경 설정 */
        html {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .long-slide {
            width: 100%;
            height: 100vh;
            margin-bottom: 80vh;
            /* 추가: 다음 문장까지의 스크롤 간격을 대폭 늘려 스크롤을 더 해야 넘어가도록 함 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            scroll-snap-align: center;
        }

        .scrolling-slide {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            padding: 80px 40px;
            background-attachment: scroll;
        }

        .slide-1 {
            background-image: url('./인터뷰페이지/서연/1.png');
            background-attachment: scroll;
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            /* 핀이 끝나면 곧바로 다음 슬라이드로 (long-slide 기본 여백 제거), 핀-스냅 충돌 방지 */
            margin-bottom: 0;
            scroll-snap-align: none;
        }

        .slide-2 {
            background-image: url('./인터뷰페이지/서연/2.png');
            background-attachment: scroll;
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
        }

        .slide-3 {
            background-image: url('./인터뷰페이지/서연/3.png');
            background-attachment: scroll;
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
        }

        /* Love ???% 박스: 구워진 단어를 검정으로 덮고, 단어를 다시 그려 페이드 인.
           배경(auto 100%, 중앙) 기하에 맞춘 좌표라 해상도와 무관하게 박스에 정렬됨 */
        .love-cover {
            position: absolute;
            /* contain 기하(이미지가 화면에 완전히 들어오고 중앙 정렬)에 맞춘 박스 좌표 */
            left: calc(50% + min(19.26vw, 34.24vh));
            top: calc(50% + min(1.356vw, 2.41vh));
            transform: translate(-50%, -50%);
            width: min(19.1vw, 34vh);
            height: min(5vw, 8.9vh);
            background: #000;
            z-index: 2;
        }

        .love-word {
            position: absolute;
            left: calc(50% + min(19.26vw, 34.24vh));
            top: calc(50% + min(1.356vw, 2.41vh));
            transform: translate(-50%, -50%);
            z-index: 3;
            color: #fff;
            font-weight: 800;
            white-space: nowrap;
            text-shadow: 0 0 12px rgba(255, 255, 255, .85), 0 0 26px rgba(255, 255, 255, .5);
            opacity: 0;
            /* 스크롤 다운에 따라 아래 ScrollTrigger가 페이드 인 제어 */
        }

        /* [모바일 반응형] 768px 이하 화면 대응 */
        @media screen and (max-width: 768px) {

            /* 슬라이드 간 스크롤 간격 축소 및 높이 조정 */
            .long-slide {
                margin-bottom: 20vh;
                min-height: 70vh;
            }

            .scrolling-slide,
            .medium-slide {
                min-height: 60vh !important;
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>
    <script>
        // ScrollTrigger 플러그인 등록
        gsap.registerPlugin(ScrollTrigger);
    </script>

    <section class="long-slide slide-1">
        <!-- 구워진 단어를 덮는 검정 박스 + 다시 그린 단어(페이드 인) -->
        <div class="love-cover"></div>
        <div class="love-word" style="font-size: min(3.375vw, 6vh);">물음표</div>
    </section>
    <section class="scrolling-slide slide-2"></section>
    <section class="scrolling-slide slide-3"></section>

    <script>
        // 'Love ???%' 박스 단어: 스크롤 다운에 따라 페이드 인 (스크롤 위치에 연동)
        // 스크롤 다운: 페이드 인 → 잠깐 유지 (scrub, 스크롤 위치에 연동)
        gsap.timeline({
            scrollTrigger: {
                trigger: '.slide-1',
                start: 'top top',
                end: '+=70%',
                scrub: true,
                pin: true,
                pinSpacing: true
            }
        })
            .to('.love-word', { opacity: 1, ease: 'none', duration: 1 })  // 페이드 인 (~40vh)
            .to({}, { duration: 0.75 });                                  // 잠깐 유지 (~30vh, 단어는 1로 유지)
    </script>
</body>

</html>
