<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>'사량'인터뷰-서영</title>

    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2206-02@1.0/OKGUNG.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/greensock/3.12.2/greensock.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/greensock/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* 기본 환경 설정 */
        html {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .long-slide {
            width: 100%;
            height: 100dvh; /* 모바일 주소창 대응을 위해 dvh로 변경 */
            margin-bottom: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            scroll-snap-align: center;
        }

        .scrolling-slide {
            width: 100%;
            min-height: 100dvh; /* 모바일 주소창 대응을 위해 dvh로 변경 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            padding: 40px 20px; /* 모바일 여백 최적화 */
            scroll-snap-align: center;
        }

        /* 공통 배경 이미지 스타일 설정 */
        .slide-1, .slide-2, .slide-3 {
            background-attachment: scroll;
            background-position: center center;
            background-size: contain; /* 이미지가 잘리지 않고 비율을 유지하도록 contain으로 변경 */
            background-repeat: no-repeat;
        }

        .slide-1 {
            background-image: url('./인터뷰페이지/서영/1.png');
        }

        .slide-2 {
            background-image: url('./인터뷰페이지/서영/2.png');
        }

        .slide-3 {
            background-image: url('./인터뷰페이지/서영/3.png');
        }
    </style>
</head>

<body>
    <script>
        // ScrollTrigger 플러그인 등록
        gsap.registerPlugin(ScrollTrigger);
    </script>

    <section class="long-slide slide-1"></section>
    <section class="scrolling-slide slide-2"></section>
    <section class="scrolling-slide slide-3"></section>
</body>

</html>
